<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>Panel de Odontólogo</title>
</head>
<body>

    <th:block layout:fragment="nav-items">
        <!-- Heading -->
        <div class="sidebar-heading">
            Herramientas de Odontólogo
        </div>

        <!-- Nav Item - Patients -->
        <li class="nav-item">
            <a class="nav-link" href="#">
                <i class="fas fa-fw fa-users"></i>
                <span>Pacientes</span>
            </a>
        </li>
    </th:block>

    <div layout:fragment="content">
        <!-- Page Heading -->
        <div class="d-sm-flex align-items-center justify-content-between mb-4">
            <h1 class="h3 mb-0 text-gray-800">Panel de Odontólogo</h1>
        </div>

        <div class="row">
            <div class="col-lg-12">
                <div class="card shadow mb-4">
                    <div class="card-header py-3">
                        <h6 class="m-0 font-weight-bold text-primary">Bienvenido</h6>
                    </div>
                    <div class="card-body">
                        <p>Bienvenido al Panel de Odontólogo. Selecciona una opción del menú para continuar.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <th:block layout:fragment="scripts">
    </th:block>
</body>
</html>
