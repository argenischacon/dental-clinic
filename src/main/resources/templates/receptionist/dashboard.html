<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>Panel de Recepcionista</title>
</head>
<body>

    <th:block layout:fragment="nav-items">
        <!-- Heading -->
        <div class="sidebar-heading">
            Recepción
        </div>
    
        <!-- Nav Item - Appointments -->
        <li class="nav-item">
            <a class="nav-link" href="#">
                <i class="fas fa-fw fa-calendar-check"></i>
                <span>Citas</span>
            </a>
        </li>

        <!-- Nav Item - Billing -->
        <li class="nav-item">
            <a class="nav-link" href="#">
                <i class="fas fa-fw fa-file-invoice-dollar"></i>
                <span>Facturación</span>
            </a>
        </li>
    </th:block>

    <div layout:fragment="content">
        <!-- Page Heading -->
        <div class="d-sm-flex align-items-center justify-content-between mb-4">
            <h1 class="h3 mb-0 text-gray-800">Panel de Recepcionista</h1>
        </div>

        <div class="row">
            <div class="col-lg-12">
                <div class="card shadow mb-4">
                    <div class="card-header py-3">
                        <h6 class="m-0 font-weight-bold text-primary">Resumen</h6>
                    </div>
                    <div class="card-body">
                        <p>Bienvenido de vuelta. Asegúrate de revisar las citas próximas de hoy.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <th:block layout:fragment="scripts">
    </th:block>
</body>
</html>
