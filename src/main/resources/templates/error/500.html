<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout/base}">
<head>
    <title>Error del Servidor</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="container-fluid">
            <!-- 500 Error Text -->
            <div class="text-center mt-5">
                <div class="error mx-auto" data-text="500">500</div>
                <p class="lead text-gray-800 mb-5">Error Interno del Servidor</p>
                <p class="text-gray-500 mb-0" th:text="${errorMessage}">Ha ocurrido un fallo inesperado.</p>
                <a th:href="@{/}">&larr; Volver al Dashboard</a>
            </div>
        </div>
    </div>
</body>
</html>
