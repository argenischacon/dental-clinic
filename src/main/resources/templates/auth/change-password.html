<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Acceso a la plataforma de la Clínica Dental">
    <meta name="author" content="Argenis Chacon">

    <title>Cambio de contraseña - Clínica Dental</title>

    <!-- Custom fonts for this template-->
    <link th:href="@{/vendor/fontawesome-free/css/all.min.css}" rel="stylesheet" type="text/css">
    <link
            href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i"
            rel="stylesheet">

    <!-- Custom styles for this template-->
    <link th:href="@{/css/sb-admin-2.min.css}" rel="stylesheet">

    <style>
        .bg-password-image {
            background: url("https://images.unsplash.com/photo-1606811841689-23dfddce3e95?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80");
            background-position: center;
            background-size: cover;
        }
        .password-container {
            position: relative;
        }
        .password-container i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #858796;
            z-index: 10;
        }
        .password-container i:hover {
            color: #4e73df;
        }
    </style>

</head>

<body class="bg-gradient-primary">

<div class="container">

    <!-- Outer Row -->
    <div class="row justify-content-center">

        <div class="col-xl-10 col-lg-12 col-md-9">

            <div class="card o-hidden border-0 shadow-lg my-5">
                <div class="card-body p-0">
                    <!-- Nested Row within Card Body -->
                    <div class="row">
                        <div class="col-lg-6 d-none d-lg-block bg-password-image"></div>
                        <div class="col-lg-6">
                            <div class="p-5">
                                <div class="text-center">
                                    <div class="sidebar-brand-icon rotate-n-15 mb-3">
                                        <i class="fas fa-lock fa-3x text-primary"></i>
                                    </div>
                                    <h1 class="h4 text-gray-900 mb-2">Actualización de Contraseña</h1>
                                    <p class="mb-4">Por tu seguridad, por favor crea una nueva contraseña para tu cuenta antes de continuar.</p>
                                </div>

                                <!-- Mensajes de Error -->
                                <div th:if="${error}" class="alert alert-danger small py-2" th:text="${error}">
                                    Las contraseñas no coinciden.
                                </div>

                                <form class="user" th:action="@{/change-password}" method="post">
                                    <div class="form-group password-container">
                                        <input type="password" name="newPassword" class="form-control form-control-user"
                                               id="newPassword" placeholder="Nueva Contraseña" required>
                                        <i class="fas fa-eye" id="toggleNewPassword"></i>
                                    </div>
                                    <div class="form-group password-container">
                                        <input type="password" name="confirmPassword" class="form-control form-control-user"
                                               id="confirmPassword" placeholder="Confirmar Nueva Contraseña" required>
                                        <i class="fas fa-eye" id="toggleConfirmPassword"></i>
                                    </div>
                                    <button type="submit" class="btn btn-primary btn-user btn-block">
                                        Cambiar Contraseña Definitiva
                                    </button>
                                </form>
                                <hr>
                                <div class="text-center">
                                    <form th:action="@{/logout}" method="post">
                                        <button type="submit" class="btn btn-link small text-secondary">
                                            Cancelar y Salir de la Sesión
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>

    </div>

</div>

<!-- Bootstrap core JavaScript-->
<script th:src="@{/vendor/jquery/jquery.min.js}"></script>
<script th:src="@{/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>

<!-- Core plugin JavaScript-->
<script th:src="@{/vendor/jquery-easing/jquery.easing.min.js}"></script>

<!-- Custom scripts for all pages-->
<script th:src="@{/js/sb-admin-2.min.js}"></script>

<script>
    const toggleNewPassword = document.querySelector('#toggleNewPassword');
    const newPassword = document.querySelector('#newPassword');

    toggleNewPassword.addEventListener('click', function (e) {
        const type = newPassword.getAttribute('type') === 'password' ? 'text' : 'password';
        newPassword.setAttribute('type', type);
        this.classList.toggle('fa-eye');
        this.classList.toggle('fa-eye-slash');
    });

    const toggleConfirmPassword = document.querySelector('#toggleConfirmPassword');
    const confirmPassword = document.querySelector('#confirmPassword');

    toggleConfirmPassword.addEventListener('click', function (e) {
        const type = confirmPassword.getAttribute('type') === 'password' ? 'text' : 'password';
        confirmPassword.setAttribute('type', type);
        this.classList.toggle('fa-eye');
        this.classList.toggle('fa-eye-slash');
    });
</script>

</body>

</html>
